# MitoRiboPy rnaseq -- exhaustive config example for `mitoribopy rnaseq --config`.
# Compatible with: MitoRiboPy 0.5.1+
#
# This is a FLAT YAML (no `rnaseq:` wrapper). Pass it to the standalone
# rnaseq subcommand:
#
#   mitoribopy rnaseq --config rnaseq_config.example.yaml \
#                     --output results/rnaseq
#
# CLI flags ALWAYS win over values read from this file, so anything you
# pass on the command line takes precedence.
#
# `mitoribopy rnaseq` has TWO mutually-exclusive flows:
#
#   * DEFAULT (from-FASTQ) -- pass raw RNA-seq + Ribo-seq FASTQs and a
#     transcriptome FASTA. The subcommand auto-detects SE vs PE from
#     filename mate tokens, runs cutadapt + bowtie2 per sample, counts
#     reads per transcript, runs pyDESeq2, then emits TE / ΔTE / plots.
#     This is the recommended starting point. Set `rna_fastq:` (and
#     usually `ribo_fastq:`) below to enter this flow. Requires the
#     `[fastq]` extra:
#         pip install 'mitoribopy[fastq]'
#
#   * ALTERNATIVE (--de-table) -- you already ran DESeq2 / Xtail /
#     Anota2Seq externally on the full transcriptome and have the
#     results table. Set `de_table:` (and `ribo_dir:`) below to enter
#     this flow. SHA256 reference-consistency gate is enforced against
#     a prior `mitoribopy rpf` run.
#
# Setting BOTH `rna_fastq:` and `de_table:` exits with code 2.
#
# For the end-to-end orchestrator (`mitoribopy all --config ...`) you
# want pipeline_config.example.yaml instead, which uses the three-
# section align: / rpf: / rnaseq: shape and supports both flows under
# the rnaseq: key.

# --- Output (BOTH FLOWS) -----------------------------------------------
# Usually passed on the command line. Uncomment to pin in the config.
# output: results/rnaseq

# --- Gene identifier convention (BOTH FLOWS; REQUIRED, no default) ----
gene_id_convention: bare                # ensembl | refseq | hgnc | mt_prefixed | bare
                                        # Mismatched conventions silently produce
                                        # zero-match runs. The most common bug.
organism: h.sapiens                     # h.sapiens | s.cerevisiae
                                        # Synonyms: h, y, human, yeast.

# --- Conditions (REQUIRED in default flow; optional in --de-table flow) -
condition_map: samples.tsv              # TSV with columns `sample` and `condition`
base_sample: control                    # reference condition (denominator of the
                                        # WT-vs-X contrast). Drives the labels on
                                        # every comparison plot. Alias for
                                        # `condition_a` -- pick one spelling.
compare_sample: knockdown               # comparison condition (numerator). Alias
                                        # for `condition_b`.

# Legacy spellings still work; uncomment to use them instead of base_sample /
# compare_sample (they MUST agree if you set both an alias and the legacy form).
# condition_a: control
# condition_b: knockdown

# ============================================================================
# Default flow (from-FASTQ) -- delete this block when using --de-table
# ============================================================================

rna_fastq:                              # files OR directories; .fq, .fq.gz,
  - input_data/rna_seq                  # .fastq, .fastq.gz are auto-globbed
  # - input_data/extra_rna.fq.gz
ribo_fastq:                             # optional; omit for an rna-only short-circuit
  - input_data/ribo_seq
reference_fasta: input_data/human-mt-mRNA.fasta
                                        # required in default flow; SHA256
                                        # recorded in run_settings.json under
                                        # `from_fastq.reference_checksum`.
bowtie2_index: null                     # optional pre-built bowtie2 prefix;
                                        # skips bowtie2-build (the index is
                                        # otherwise content-addressed at
                                        # <workdir>/bt2_cache/transcriptome_<sha12>).
workdir: null                           # scratch dir; default <output>/work
align_threads: 4                        # threads passed to cutadapt + bowtie2

# When a condition has only 1 sample, the run fails fast (publication-
# safe default). Opt INTO the FASTQ-record-parity pseudo-replicate
# fallback by setting the flag below to `true`; this is for tutorial /
# demo use only — the resulting padj is NOT biologically defensible
# because the two halves are mechanical subsamples of one library.
# When opted in, the augmented condition map lands at
# <output>/condition_map.augmented.tsv, run_settings.json carries
# `pseudo_replicate_mode: true`, and EXPLORATORY.md is written to the
# output dir listing the fields not to cite.
allow_pseudo_replicates: false

# Notes on the default flow:
# - PE + UMI is currently NotImplementedError. Preprocess UMIs into the
#   read name before invoking the default flow, or use the alternative
#   --de-table flow.
# - DE statistics over 13 mt-mRNAs are noisy. The default flow is for
#   exploratory pipeline runs and validation; for publication-grade DE
#   statistics still run DESeq2 / Xtail / Anota2Seq externally on the
#   full transcriptome and use the alternative flow.
# - The reference-consistency hard-gate is skipped here (we hash the
#   FASTA ourselves instead).

# ============================================================================
# Alternative flow (--de-table) -- delete this block when using --rna-fastq
# ============================================================================

# To USE this flow, comment out the `rna_fastq:` line above so the two
# flags don't collide, and uncomment the keys below.
#
# # --- DE table ---------------------------------------------------------
# de_table: de.tsv                        # DESeq2 / Xtail / Anota2Seq output (CSV/TSV)
# de_format: auto                         # auto | deseq2 | xtail | anota2seq | custom
#                                         # `auto` keys off the log2FC column name.
# de_gene_col: null                       # only when de_format=custom
# de_log2fc_col: null
# de_padj_col: null
# de_basemean_col: null
#
# # --- Ribo-seq inputs --------------------------------------------------
# ribo_dir: results/rpf                   # output of a prior `mitoribopy rpf` run.
#                                         # Must contain rpf_counts.tsv +
#                                         # run_settings.json with reference_checksum.
# ribo_counts: null                       # explicit override; defaults to
#                                         # <ribo-dir>/rpf_counts.tsv
#
# # --- Reference-consistency gate (pass exactly one) --------------------
# reference_gtf: input_data/human-mt-mRNA.fasta   # SHA256-hash-compared against
#                                                  # rpf's reference_checksum
# reference_checksum: null                # OR pre-computed sha256 string
